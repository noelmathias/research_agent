services:
  ollama:
    image: ollama/ollama:latest
    container_name: research-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: research-agent-backend
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      CHROMA_PERSIST_DIR: /app/data/vectorstore
      UPLOAD_DIR: /app/data/uploads
      REPORTS_DIR: /app/data/reports
      LOG_DIR: /app/logs
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: research-agent-frontend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
  app_data:
  app_logs:
